---
layout: default
---
<article class="prose">
  <p class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d. %B %Y" }}</time>
    {% if page.tags.size > 0 %} · {{ page.tags | join: " · " }}{% endif %}
  </p>
  <h1 style="font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.4rem); margin-top:0;">
    {{ page.title }}
  </h1>

  {{ content }}

  <p style="margin-top:3rem;"><a href="{{ '/blog/' | relative_url }}">&larr; Zurück zur Blog-Übersicht</a></p>
</article>
